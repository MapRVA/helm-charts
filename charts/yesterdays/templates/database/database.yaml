{{- if eq .Values.database.backend "cnpg" }}
{{- if .Values.database.backup.enabled }}
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ .Values.database.backup.objectStoreName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
spec:
  configuration:
    destinationPath: {{ .Values.database.backup.s3Credentials.destinationPath }}
    endpointURL: {{ .Values.database.backup.s3Credentials.endpointUrl }}
    s3Credentials:
      accessKeyId:
        name: {{ .Values.database.backup.s3Credentials.accessKeyId.name }}
        key: {{ .Values.database.backup.s3Credentials.accessKeyId.key }}
      secretAccessKey:
        name: {{ .Values.database.backup.s3Credentials.secretAccessKey.name }}
        key: {{ .Values.database.backup.s3Credentials.secretAccessKey.key }}
    wal:
      compression: gzip
  retentionPolicy: {{ .Values.database.backup.retentionPolicy }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: georef-backup
spec:
  cluster:
    name: georef-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  schedule: {{ .Values.database.backup.schedule }}
  backupOwnerReference: self
---
{{- end }}
{{- if .Values.database.recover.enabled }}
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ .Values.database.recover.objectStoreName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
spec:
  configuration:
    destinationPath: {{ .Values.database.recover.s3Credentials.destinationPath }}
    endpointURL: {{ .Values.database.recover.s3Credentials.endpointUrl }}
    s3Credentials:
      accessKeyId:
        name: {{ .Values.database.recover.s3Credentials.accessKeyId.name }}
        key: {{ .Values.database.recover.s3Credentials.accessKeyId.key }}
      secretAccessKey:
        name: {{ .Values.database.recover.s3Credentials.secretAccessKey.name }}
        key: {{ .Values.database.recover.s3Credentials.secretAccessKey.key }}
    wal:
      compression: gzip
---
{{- end }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: georef-db
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
spec:
  instances: {{ .Values.database.replicas }}
  imageName: ghcr.io/maprva/cnpg-postgis-pgvector:17
  resources:
    requests:
      cpu: {{ .Values.database.resources.requests.cpu }}
      memory: {{ .Values.database.resources.requests.memory }}
    limits:
      cpu: {{ .Values.database.resources.limits.cpu }}
      memory: {{ .Values.database.resources.limits.memory }}
  # PGTune inputs: PG 17, Linux, Mixed, 4GB RAM, 2 CPU, 100 connections, SSD (NVMe).
  # Two deliberate deviations from PGTune output:
  #   - effective_io_concurrency: 500 (vs. PGTune's 1000 for NVMe) to account for
  #     consumer NVMe behind VM passthrough — splits the difference with SATA SSD (200).
  #   - work_mem: held at 4MB (below PGTune's suggestion) to bound worst-case exposure
  #     at 100 connections (100 * 4MB = 400MB) against 1GB shared_buffers / 4GB limit.
  # Re-run https://pgtune.leopard.in.ua/ if the resources block above changes.
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      maintenance_work_mem: "256MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "500"
      work_mem: "4MB"
      huge_pages: "off"
      jit: "off"
      wal_compression: "lz4"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      max_parallel_workers_per_gather: "1"
      max_parallel_workers: "2"
      max_parallel_maintenance_workers: "1"
    shared_preload_libraries:
      - pg_stat_statements
  {{- if .Values.database.recover.enabled }}
  bootstrap:
    recovery:
      source: source
  externalClusters:
  - name: source
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: {{ .Values.database.recover.objectStoreName }}
        serverName: georef-db
  {{- else }}
  bootstrap:
    initdb:
      postInitTemplateSQL:
        - CREATE EXTENSION vector;
        - CREATE EXTENSION pg_trgm;
        - CREATE EXTENSION postgis;
  {{- end }}
  {{- if .Values.database.backup.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Values.database.backup.objectStoreName }}
  {{- end }}
  storage:
    storageClass: {{ .Values.database.storage.storageClass }}
    size: {{ .Values.database.storage.size }}
{{- else if eq .Values.database.backend "simple" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: georef-db
  namespace: {{ .Release.Namespace }}
  labels:
    app: georeference-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: georeference-tool
  template:
    metadata:
      labels:
        app: georeference-tool
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: postgres
        image: ghcr.io/maprva/cnpg-postgis-pgvector:17
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: georef
        - name: POSTGRES_USER
          value: django_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: georef-db
              key: password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: yesterdays-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yesterdays-db-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.database.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.database.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: georef-db
  namespace: {{ .Release.Namespace }}
  labels:
    app: georef-db
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app: georef-db
{{- end }}
