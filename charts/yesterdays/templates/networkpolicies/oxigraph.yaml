{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oxigraph-network-policy
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  podSelector:
    matchLabels:
      app: subjects-oxigraph
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow connections from frontend
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-frontend
      ports:
        - protocol: TCP
          port: 7878
    # Allow connections from background workers
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-background-worker
      ports:
        - protocol: TCP
          port: 7878
    # Allow connections from urgent workers
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-urgent-worker
      ports:
        - protocol: TCP
          port: 7878
    # Allow connections from celery-beat
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-celery-beat
      ports:
        - protocol: TCP
          port: 7878
    # Allow connections from import
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-import
      ports:
        - protocol: TCP
          port: 7878
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dns.namespace }}
          podSelector:
            {{- toYaml .Values.networkPolicies.dns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
