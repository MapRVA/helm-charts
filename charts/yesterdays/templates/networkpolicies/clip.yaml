{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clip-network-policy
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  podSelector:
    matchLabels:
      app: yesterdays-clip
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow connections from frontend (semantic search queries)
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-frontend
      ports:
        - protocol: TCP
          port: 8000
    # Allow connections from import (generate_embeddings backfill)
    - from:
        - podSelector:
            matchLabels:
              app: yesterdays-import
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution. The service makes no other outbound connections —
    # the model is baked into the image, so no egress to R2/HuggingFace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dns.namespace }}
          podSelector:
            {{- toYaml .Values.networkPolicies.dns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
