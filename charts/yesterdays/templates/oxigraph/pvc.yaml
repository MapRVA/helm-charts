{{- $pvcExists := (lookup "v1" "PersistentVolumeClaim" .Release.Namespace "subjects-oxigraph-data") }}
{{- if not $pvcExists }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: subjects-oxigraph-data
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.oxigraph.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.oxigraph.storage.size }}
{{- end }}
