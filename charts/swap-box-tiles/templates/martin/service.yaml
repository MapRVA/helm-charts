apiVersion: v1
kind: Service
metadata:
  name: {{ include "swapbox.fullname" . }}-martin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swapbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    {{- include "swapbox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: martin
