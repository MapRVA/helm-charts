apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swapbox.fullname" . }}-martin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swapbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
spec:
  {{- if not .Values.martin.hpa.enabled }}
  replicas: {{ .Values.martin.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "swapbox.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: martin
  template:
    metadata:
      labels:
        {{- include "swapbox.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: martin
      annotations:
        # Roll pods when the config changes.
        checksum/config: {{ include (print $.Template.BasePath "/martin/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: martin
          image: {{ .Values.martin.image }}
          imagePullPolicy: {{ .Values.martin.pullPolicy }}
          args: ["--config", "/etc/martin/martin.yaml"]
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: password
            # Read from the -ro service so tile load can scale across replicas.
            - name: DATABASE_URL
              value: "postgres://$(PGUSER):$(PGPASSWORD)@{{ include "swapbox.dbHostRO" . }}:5432/{{ .Values.cnpg.database.name }}"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /catalog
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/martin
              readOnly: true
          resources:
            {{- toYaml .Values.martin.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "swapbox.fullname" . }}-martin
