apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swapbox.fullname" . }}-martin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swapbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
spec:
  {{- if not .Values.martin.hpa.enabled }}
  replicas: {{ .Values.martin.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "swapbox.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: martin
  template:
    metadata:
      labels:
        {{- include "swapbox.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: martin
      annotations:
        # Roll pods when the config changes.
        checksum/config: {{ include (print $.Template.BasePath "/martin/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      initContainers:
        # Hold the pod in Init until the database is reachable AND the schema
        # Job has created swapbox_v1. Avoids CrashLoopBackOff during install
        # while the CNPG cluster initdbs and the bootstrap Job imports the
        # planet extract (which can take 20–30 minutes).
        - name: wait-for-schema
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "Waiting for database..."
                sleep 5
              done
              until psql -tAc "SELECT 1 FROM pg_proc WHERE proname = 'swapbox_v1'" | grep -q 1; do
                echo "Waiting for swapbox_v1 function..."
                sleep 10
              done
          env:
            - name: PGHOST
              value: {{ include "swapbox.dbHostRead" . | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: password
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: dbname
      containers:
        - name: martin
          image: {{ .Values.martin.image }}
          imagePullPolicy: {{ .Values.martin.pullPolicy }}
          args: ["--config", "/etc/martin/martin.yaml"]
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(PGUSER):$(PGPASSWORD)@{{ include "swapbox.dbHostRead" . }}:5432/{{ .Values.cnpg.database.name }}"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /catalog
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/martin
              readOnly: true
          resources:
            {{- toYaml .Values.martin.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "swapbox.fullname" . }}-martin
