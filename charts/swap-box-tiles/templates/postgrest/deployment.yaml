apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swapbox.fullname" . }}-postgrest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swapbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
spec:
  replicas: {{ .Values.postgrest.replicaCount }}
  selector:
    matchLabels:
      {{- include "swapbox.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgrest
  template:
    metadata:
      labels:
        {{- include "swapbox.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgrest
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      initContainers:
        # Hold the pod in Init until the database is reachable AND the schema
        # Job has created freshness(). Avoids CrashLoopBackOff during install
        # while the CNPG cluster initdbs and the bootstrap Job runs.
        - name: wait-for-schema
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "Waiting for database..."
                sleep 5
              done
              until psql -tAc "SELECT 1 FROM pg_proc WHERE proname = 'freshness'" | grep -q 1; do
                echo "Waiting for freshness function..."
                sleep 10
              done
          env:
            - name: PGHOST
              value: {{ include "swapbox.dbHostRead" . | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: password
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.dbAppSecret" . }}
                  key: dbname
      containers:
        - name: postgrest
          image: {{ .Values.postgrest.image }}
          imagePullPolicy: {{ .Values.postgrest.pullPolicy }}
          env:
            - name: PGRST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "swapbox.postgrestSecret" . }}
                  key: password
            - name: PGRST_DB_URI
              value: "postgres://postgrest_auth:$(PGRST_DB_PASSWORD)@{{ include "swapbox.dbHostRead" . }}:5432/{{ .Values.cnpg.database.name }}"
            - name: PGRST_DB_SCHEMAS
              value: public
            - name: PGRST_DB_ANON_ROLE
              value: postgrest_reader
            - name: PGRST_OPENAPI_MODE
              value: disabled
            - name: PGRST_SERVER_CORS_ALLOWED_ORIGINS
              value: "*"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /rpc/freshness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 60
          resources:
            {{- toYaml .Values.postgrest.resources | nindent 12 }}
