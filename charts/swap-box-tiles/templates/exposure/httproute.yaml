{{- if eq .Values.exposure.type "gateway" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "swapbox.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swapbox.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.exposure.gateway.parentRefs | nindent 4 }}
  {{- with .Values.exposure.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /swapbox_v1
      backendRefs:
        - name: {{ include "swapbox.fullname" . }}-martin
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /freshness
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /rpc/freshness
      backendRefs:
        - name: {{ include "swapbox.fullname" . }}-postgrest
          port: 3000
{{- end }}
