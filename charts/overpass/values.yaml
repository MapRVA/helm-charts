image:
  repository: wiktorn/overpass-api
  tag: "0.7.62"

overpass:
  meta: "yes"
  planetUrl: "https://download.geofabrik.de/north-america/us/virginia-latest.osm.pbf"
  diffUrl: "https://planet.openstreetmap.org/replication/minute/"
  rulesLoad: "10"
  allowDuplicateQueries: "yes"
  compression: "gz"
  useAreas: "true"
  updateSleep: "60"
  planetPreprocess: >-
    mv /db/planet.osm.bz2 /db/planet.osm.pbf &&
    osmium cat -o /db/planet.osm.bz2 /db/planet.osm.pbf &&
    rm /db/planet.osm.pbf
  diffPreprocess: >-
    mv /db/diffs/changes.osc /db/diffs/planet.osc &&
    osmium extract -b -83.68,36.54,-75.24,39.47 /db/diffs/planet.osc -o /db/diffs/changes.osc --overwrite &&
    rm /db/diffs/planet.osc

resources:
  requests:
    memory: "2Gi"
    cpu: "300m"
  limits:
    memory: "15Gi"
    cpu: "3000m"

storage:
  storageClass: local-path
  size: 30Gi

exposure:
  type: none

  # Traditional Kubernetes Ingress configuration (used when type: ingress)
  ingress:
    className: ""
    annotations: {}
    hosts:
      - host: overpass.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # Network policy: which pods can send traffic to overpass
    networkPolicy:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx

  # Gateway API configuration (used when type: gateway)
  gateway:
    parentRefs:
      - name: eg
        namespace: envoy-gateway-system
    hostnames:
      - overpass.example.com
    # Network policy: which pods can send traffic to overpass
    networkPolicy:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: envoy-gateway-system
      podSelector:
        matchLabels:
          gateway.envoyproxy.io/owning-gateway-name: eg

  # Custom configuration (used when type: custom)
  custom:
    networkPolicy: []

networkPolicies:
  enabled: true

  externalEgress:
    allowAll: true

  dns:
    namespace: kube-system
    podSelector:
      matchLabels:
        k8s-app: kube-dns
