image:
  repository: b1tw153/overpass-api
  tag: "0.7.62.11-r13"

overpass:
  # One-time DB initialization. Runs as an initContainer; skipped on subsequent
  # pod starts if the DB on the PVC is already populated.
  init:
    # mode: import | clone
    #   import: load a planet/extract file (PBF, .osm.bz2) via import_osm_data.sh
    #   clone:  copy an existing DB from another Overpass server via download_clone.sh
    mode: import
    # Used when mode: import. PBF is supported natively (no preprocess needed).
    dataSource: "https://download.geofabrik.de/north-america/us/virginia-latest.osm.pbf"
    # Used when mode: clone.
    cloneSource: "http://dev.overpass-api.de/api_drolbr/"
    # Compression for the on-disk DB. lz4 | gz | no
    compressionMethod: "lz4"

  metaMode: "yes"
  diffUrl: "https://planet.openstreetmap.org/replication/minute/"
  areas: "yes"
  # Diff polling interval in seconds. Leave unset for auto-detect from
  # Last-Modified. Virginia's Geofabrik stream is hourly.
  updateFrequency: "60"
  replicateId: "auto"
  # b1tw153 default is "yes"; wiktorn was "no". Set explicitly.
  allowDuplicateQueries: "yes"
  # Optional: schedule area-update runs at a fixed HH:MM (UTC). Leave blank to
  # run on every DB update.
  areaUpdateTime: ""
  # Optional periodic backups (requires the backup volume below).
  backupTime: ""       # e.g. "03:00"
  backupDay: ""        # e.g. "sun" for weekly; blank = daily when backupTime set

  # Optional: cap dispatcher base space (bytes). Leave blank to auto-derive
  # from the container memory limit (80%).
  dispatcherBaseSpace: ""

  # Static files served by nginx at the web root from /opt/overpass/static.
  # Each key becomes a file overlaid into that directory via a subPath mount,
  # so you only replace the files you list — the image's baked-in defaults
  # (robots.txt, llms.txt) stay in place for anything you omit. Best for small
  # text files (index.html, robots.txt); a ConfigMap caps at ~1Mi and binary
  # assets become awkward — use extraVolumes below for those.
  # Editing these rolls the pod (subPath mounts don't live-update).
  #
  # This chart ships a minimal default index.html landing page (below). Replace
  # it with your own markup, add more files (e.g. a custom robots.txt), or drop
  # the landing page entirely with `index.html: null`.
  staticFiles:
    index.html: |
      <!doctype html>
      <html lang="en">
        <head>
          <meta charset="utf-8">
          <title>MapRVA Overpass Chart</title>
        </head>
        <body>
          <h1>MapRVA Overpass Chart</h1>
          <p>You have successfully installed the MapRVA
            <a href="https://github.com/MapRVA/helm-charts/tree/main/charts/overpass">Overpass Helm chart</a>.</p>
          <p>This is an Overpass API server. Send queries to
            <a href="/api/interpreter">/api/interpreter</a>.</p>
        </body>
      </html>

# Generic pod-level volume passthrough for anything staticFiles can't express:
# a pre-built ConfigMap/Secret, a PVC holding large or binary web assets, etc.
# extraVolumeMounts are added to the overpass (nginx) container.
extraVolumes: []
# extraVolumes:
#   - name: landing-assets
#     configMap:
#       name: my-overpass-landing
extraVolumeMounts: []
# extraVolumeMounts:
#   - name: landing-assets
#     mountPath: /opt/overpass/static/assets
#     readOnly: true

resources:
  requests:
    memory: "2Gi"
    cpu: "300m"
  limits:
    memory: "15Gi"
    cpu: "3000m"

storage:
  storageClass: local-path
  size: 30Gi
  # Bump to force a fresh database even if config hasn't changed.
  # NOTE: the resulting PVC must be chown'd to UID/GID 10001 by the operator
  # before the pod starts. See README.
  revision: "1"

exposure:
  type: none

  # Traditional Kubernetes Ingress configuration (used when type: ingress)
  ingress:
    className: ""
    annotations: {}
    hosts:
      - host: overpass.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # Network policy: which pods can send traffic to overpass
    networkPolicy:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx

  # Gateway API configuration (used when type: gateway)
  gateway:
    parentRefs:
      - name: eg
        namespace: envoy-gateway-system
    hostnames:
      - overpass.example.com
    # Network policy: which pods can send traffic to overpass
    networkPolicy:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: envoy-gateway-system
      podSelector:
        matchLabels:
          gateway.envoyproxy.io/owning-gateway-name: eg

  # Custom configuration (used when type: custom)
  custom:
    networkPolicy: []

networkPolicies:
  enabled: true

  externalEgress:
    allowAll: true

  dns:
    namespace: kube-system
    podSelector:
      matchLabels:
        k8s-app: kube-dns
