apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: overpass-data-{{ include "overpass.dataHash" . }}
  namespace: {{ .Release.Namespace }}

spec:
  storageClassName: {{ .Values.storage.storageClass }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}
