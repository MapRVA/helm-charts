apiVersion: apps/v1
kind: Deployment
metadata:
  name: overpass
  namespace: {{ .Release.Namespace }}
  labels:
    app: overpass
    component: server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: overpass
      component: server
  template:
    metadata:
      labels:
        app: overpass
        component: server
      {{- if .Values.overpass.staticFiles }}
      annotations:
        # subPath mounts don't live-update when the ConfigMap changes, so roll
        # the pod whenever the static content does.
        checksum/static: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- end }}
    spec:
      # b1tw153/overpass-api runs as UID 10001 and does not chown its volume.
      # The PVC must already be owned by 10001:10001 — see README.
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
      # SIGKILL during an in-flight DB write can corrupt the database; the
      # b1tw153 docs call for ~600s of grace.
      terminationGracePeriodSeconds: 600
      initContainers:
        - name: init-db
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              if [ -f /opt/overpass/db/.init-complete ]; then
                echo "Overpass DB already initialized, skipping init."
                exit 0
              fi
              {{- if eq .Values.overpass.init.mode "clone" }}
              /opt/overpass/bin/download_clone.sh \
                --source="$CLONE_SOURCE" \
                --meta="$OVERPASS_META_MODE"
              {{- else }}
              /opt/overpass/bin/import_osm_data.sh \
                --data-source="$IMPORT_OSM_DATA_SOURCE" \
                --diff-url="$OVERPASS_DIFF_URL" \
                --meta="$OVERPASS_META_MODE" \
                --compression-method="$IMPORT_OSM_COMPRESSION_METHOD"
              {{- end }}
              touch /opt/overpass/db/.init-complete
          env:
            - name: OVERPASS_META_MODE
              value: {{ .Values.overpass.metaMode | quote }}
            - name: OVERPASS_DIFF_URL
              value: {{ .Values.overpass.diffUrl | quote }}
            {{- if eq .Values.overpass.init.mode "clone" }}
            - name: CLONE_SOURCE
              value: {{ .Values.overpass.init.cloneSource | quote }}
            {{- else }}
            - name: IMPORT_OSM_DATA_SOURCE
              value: {{ .Values.overpass.init.dataSource | quote }}
            - name: IMPORT_OSM_COMPRESSION_METHOD
              value: {{ .Values.overpass.init.compressionMethod | quote }}
            {{- end }}
          volumeMounts:
            - name: overpass-data
              mountPath: /opt/overpass/db
      containers:
        - name: overpass
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: OVERPASS_META_MODE
              value: {{ .Values.overpass.metaMode | quote }}
            - name: OVERPASS_DIFF_URL
              value: {{ .Values.overpass.diffUrl | quote }}
            - name: OVERPASS_AREAS
              value: {{ .Values.overpass.areas | quote }}
            - name: OVERPASS_REPLICATE_ID
              value: {{ .Values.overpass.replicateId | quote }}
            - name: DISPATCHER_ALLOW_DUPLICATE_QUERIES
              value: {{ .Values.overpass.allowDuplicateQueries | quote }}
            {{- if .Values.overpass.updateFrequency }}
            - name: OVERPASS_UPDATE_FREQUENCY
              value: {{ .Values.overpass.updateFrequency | quote }}
            {{- end }}
            {{- if .Values.overpass.areaUpdateTime }}
            - name: AREA_UPDATE_TIME
              value: {{ .Values.overpass.areaUpdateTime | quote }}
            {{- end }}
            {{- if .Values.overpass.backupTime }}
            - name: OVERPASS_BACKUP_TIME
              value: {{ .Values.overpass.backupTime | quote }}
            {{- end }}
            {{- if .Values.overpass.backupDay }}
            - name: OVERPASS_BACKUP_DAY
              value: {{ .Values.overpass.backupDay | quote }}
            {{- end }}
            {{- if .Values.overpass.dispatcherBaseSpace }}
            - name: DISPATCHER_BASE_SPACE
              value: {{ .Values.overpass.dispatcherBaseSpace | quote }}
            {{- end }}
          # Use /liveness — the baked-in /api/status healthcheck can flap during
          # shutdown and long batches per the b1tw153 docs.
          readinessProbe:
            httpGet:
              path: /liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 1000
          volumeMounts:
            - name: overpass-data
              mountPath: /opt/overpass/db
            {{- range $name, $content := .Values.overpass.staticFiles }}
            # Per-file subPath overlay: replaces this one file in the image's
            # /opt/overpass/static dir while leaving the baked-in defaults
            # (robots.txt, llms.txt, ...) in place.
            - name: overpass-static
              mountPath: /opt/overpass/static/{{ $name }}
              subPath: {{ $name }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: overpass-data
          persistentVolumeClaim:
            claimName: overpass-data-{{ include "overpass.dataHash" . }}
        {{- if .Values.overpass.staticFiles }}
        - name: overpass-static
          configMap:
            name: overpass-static
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: overpass
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: overpass
    component: server
  ports:
    - port: 80
      targetPort: 8080
---
{{- if eq .Values.exposure.type "ingress" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overpass
  namespace: {{ .Release.Namespace }}
  {{- with .Values.exposure.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.exposure.ingress.className }}
  ingressClassName: {{ .Values.exposure.ingress.className }}
  {{- end }}
  {{- if .Values.exposure.ingress.tls }}
  tls:
    {{- toYaml .Values.exposure.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.exposure.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: overpass
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if eq .Values.exposure.type "gateway" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: overpass
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    {{- toYaml .Values.exposure.gateway.parentRefs | nindent 4 }}
  {{- if .Values.exposure.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.exposure.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: overpass
          port: 80
{{- end }}
